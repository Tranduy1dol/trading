name: Continuous Integration

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  cargo-check:
    name: Cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Run cargo check
        run: cargo check --workspace

  fmt-check:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  toml-fmt:
    name: TOML fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check TOML formatting
        run: pipx run tombi format --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --workspace --all-features -- -D warnings

  test-and-coverage:
    name: Test and Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run tests with coverage
        run: cargo tarpaulin --all-features --workspace --verbose --tests --skip-clean --out xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  benchmark-and-update-readme:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Run Benchmarks and Update README
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: dtolnay/rust-toolchain@nightly

      - name: Run Gateway Benchmark
        run: |
          taskset -c 0 cargo bench --workspace | sed -r 's/\x1B\[[0-9;]*[mK]//g' > bench_output.md

      - name: Swap into README
        run: |
          python3 -c "
          import re
          with open('bench_output.md', 'r') as f:
            lines = f.readlines()
            
          output = '```text\n'
          for i, line in enumerate(lines):
              line_str = line.strip()
              if line_str.startswith('OrderBook_100Level/') or line_str.startswith('wire_to_wire/'):
                  output += line
                  j = 1
                  while i + j < len(lines):
                      next_line = lines[i+j]
                      next_str = next_line.strip()
                      if next_str.startswith('time:') or next_str.startswith('change:'):
                          output += next_line
                      elif next_str == '' or '/' in next_str:
                          break
                      j += 1
                  output += '\n'
          output += '```\n'

          with open('README.md', 'r') as f:
            readme = f.read()
            
          new_readme = re.sub(
            r'<!-- BENCH_START -->.*?<!-- BENCH_END -->', 
            f'<!-- BENCH_START -->\n{output}<!-- BENCH_END -->', 
            readme, 
            flags=re.DOTALL
          )
          with open('README.md', 'w') as f:
            f.write(new_readme)
          "

      - name: Commit & Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(bench): auto-update benchmark results in README"
          file_pattern: "README.md"
